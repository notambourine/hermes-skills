name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: shellcheck (*.sh, *.bash)
        run: |
          files=$(git ls-files '*.sh' '*.bash')
          if [ -z "$files" ]; then
            echo "no shell files to lint"; exit 0
          fi
          echo "$files" | xargs shellcheck

  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: ruff check (*.py)
        # Pinned for reproducibility; bump deliberately. pipx is preinstalled on the runner.
        run: pipx run --spec ruff==0.15.18 ruff check .
